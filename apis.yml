apis:
  - aid: demostack:demostack-webhooks
    name: Demostack Webhooks
    description: >-
      Demostack webhooks push real-time demo engagement events to any CRM,
      data warehouse, BI tool, or custom HTTP endpoint. Events are fired when
      prospects view, interact with, or complete a demo, enabling automated
      follow-ups, lead scoring updates, and cold-deal flagging. Native
      connectors surface these events directly inside Salesforce, HubSpot,
      and Slack without requiring custom integration work.
